{% extends 'base.html' %}

{% block content %}

<style>
/* ---------- PAGE CENTER ---------- */
.signup-wrapper {
    min-height: 85vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ---------- CARD ---------- */
.signup-card {
    width: 100%;
    max-width: 440px;
    background: white;
    padding: 42px 38px;
    border-radius: 16px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.10);
    animation: fadeUp 0.8s ease;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ---------- TITLE ---------- */
.signup-card h2 {
    text-align: center;
    margin-bottom: 8px;
    font-weight: 700;
}

.signup-card p {
    text-align: center;
    font-size: 14px;
    color: #666;
    margin-bottom: 28px;
}

/* ---------- FORM ---------- */
.form-group {
    margin-bottom: 16px;
}

.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
}

.form-group input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
    transition: all 0.2s ease;
}

.form-group input:focus {
    outline: none;
    border-color: #198754;
    box-shadow: 0 0 0 3px rgba(25,135,84,0.15);
}

/* ---------- BUTTON ---------- */
.signup-btn {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #198754, #22c55e);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    margin-top: 12px;
}

.signup-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(25,135,84,0.35);
}

/* ---------- EXTRA ---------- */
.extra {
    margin-top: 18px;
    text-align: center;
    font-size: 14px;
}

.extra a {
    color: #198754;
    text-decoration: none;
    font-weight: 600;
}

.extra a:hover {
    text-decoration: underline;
}

/* ---------- ERROR ---------- */
.errorlist {
    color: #dc3545;
    font-size: 13px;
    margin-bottom: 6px;
    list-style: none;
    padding-left: 0;
}
</style>

<div class="signup-wrapper">

    <div class="signup-card">

        <h2>Create Your Account ✨</h2>
        <p>Join MindSphere and start your wellness journey</p>

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                <div class="form-group">
                    {{ field.label_tag }}
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}

            <button type="submit" class="signup-btn">
                Create Account
            </button>
        </form>

        <div class="extra">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </div>

    </div>

</div>

{% endblock %}
