{% extends 'base.html' %}

{% block content %}
<h2>🧠 Thought Clearing</h2>
<p style="max-width:520px; margin:auto;">
    Write what’s bothering you.  
    When you’re ready, release it.
</p>

<div class="container">
    <textarea id="thoughtInput" placeholder="Type your thought here…"></textarea>
    <br>
    <button onclick="releaseThought()">Release</button>
</div>

<!-- Big bubble -->
<div id="bubbleContainer" class="hidden">
    <div id="thoughtBubble"></div>
</div>

<!-- Pleasant floating message -->
<div id="pleasantMessage" class="hidden">
    😊 You’ve let it go.  
    Feel the calm moving through you.
</div>

<a href="{% url 'games_home' %}">⬅ Back to Mind Games</a>

<style>
.container {
    max-width: 540px;
    margin: 40px auto;
    text-align: center;
}

/* Input */
textarea {
    width: 100%;
    height: 100px;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 15px;
}

/* Button */
button {
    margin-top: 15px;
    padding: 12px 22px;
    border: none;
    border-radius: 8px;
    background: #0d6efd;
    color: white;
    font-size: 15px;
    cursor: pointer;
}
button:hover {
    background: #0b5ed7;
}

/* Bubble container */
#bubbleContainer {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    z-index: 999;
}

/* Bubble */
#thoughtBubble {
    background: #f8d7da;
    padding: 30px 36px;
    border-radius: 24px;
    font-size: 22px;
    max-width: 70%;
    text-align: center;
}

/* Shake + shatter animation */
.animateBubble {
    animation: shake 0.6s ease-in-out 2,
               shatter 3.6s ease-in-out forwards;
}

/* Shake */
@keyframes shake {
    0% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(8px); }
    100% { transform: translateX(0); }
}

/* Shatter / dissolve */
@keyframes shatter {
    0% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
    }
    40% {
        transform: scale(1.1);
    }
    70% {
        opacity: 0.7;
        transform: translateY(-80px) rotate(6deg) scale(1.05);
        filter: blur(2px);
    }
    100% {
        opacity: 0;
        transform: translateY(-260px) rotate(12deg) scale(0.9);
        filter: blur(6px);
    }
}

/* Pleasant message */
#pleasantMessage {
    position: fixed;
    bottom: 35%;
    left: -100%;
    font-size: 28px;
    font-weight: 600;
    color: #2c7;
}

/* Floating animation */
.animateMessage {
    animation: floatMessage 5s ease-in-out forwards;
}

@keyframes floatMessage {
    0% { opacity: 0; left: -100%; }
    20% { opacity: 1; }
    80% { left: 50%; transform: translateX(-50%); }
    100% { opacity: 0; left: 110%; }
}

/* Utility */
.hidden {
    display: none;
}
</style>

<script>
function releaseThought() {
    const input = document.getElementById("thoughtInput");
    const bubbleContainer = document.getElementById("bubbleContainer");
    const bubble = document.getElementById("thoughtBubble");
    const message = document.getElementById("pleasantMessage");

    if (input.value.trim() === "") {
        alert("Write the thought you want to release.");
        return;
    }

    // Reset states
    bubble.classList.remove("animateBubble");
    message.classList.remove("animateMessage");
    message.classList.add("hidden");

    // Set bubble text
    bubble.innerText = input.value;

    // Clear input (symbolic release)
    input.value = "";

    // Show bubble
    bubbleContainer.classList.remove("hidden");

    // Force reflow (critical)
    void bubble.offsetWidth;

    // Start bubble animation
    bubble.classList.add("animateBubble");

    // Start pleasant message slightly BEFORE bubble ends (no lag)
    setTimeout(() => {
        message.classList.remove("hidden");
        void message.offsetWidth;
        message.classList.add("animateMessage");
    }, 3600);

    // Remove bubble fully
    setTimeout(() => {
        bubbleContainer.classList.add("hidden");
    }, 4200);

    // Hide pleasant message after 5 seconds
    setTimeout(() => {
        message.classList.add("hidden");
        message.classList.remove("animateMessage");
    }, 8600);
}
</script>
{% endblock %}
