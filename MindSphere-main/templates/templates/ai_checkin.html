<!DOCTYPE html>
<html>
<head>
    <title>AI Mental Check-In</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        video {
            width: 100%;
            border-radius: 10px;
            margin-top: 15px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #0d6efd;
            color: white;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🤖 AI Mental Check-In</h2>
    <p>This feature uses your camera to assist mood awareness.</p>

    <video id="video" autoplay></video>

    <button onclick="startCamera()">Start Camera</button>

    <p style="font-size:12px; color:gray; margin-top:15px;">
        This feature provides supportive insights only.
        It does not diagnose mental health conditions.
    </p>
</div>

<script>
function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            document.getElementById('video').srcObject = stream;
        })
        .catch(err => {
            alert("Camera access denied");
        });
}
</script>

</body>
</html>
